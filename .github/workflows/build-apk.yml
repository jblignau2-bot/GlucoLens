name: Build Android APK

on:
  workflow_dispatch: # Manual trigger from GitHub UI
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache disabled - no lockfile

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: glucolens-mobile
        run: npm install

      - name: Create .env for build
        working-directory: glucolens-mobile
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL=${{ secrets.API_URL }}
          EOF

      - name: Generate native Android project
        working-directory: glucolens-mobile
        run: npx expo prebuild --platform android --no-install

      - name: Install Android dependencies
        working-directory: glucolens-mobile/android
        run: |
          # Accept all licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          chmod +x gradlew

      - name: Build APK
        working-directory: glucolens-mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlucoLens-APK
          path: glucolens-mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

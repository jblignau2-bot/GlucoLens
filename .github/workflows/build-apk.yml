name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: glucolens-mobile
        run: npm install --legacy-peer-deps

      - name: Create .env for build
        working-directory: glucolens-mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=$SUPABASE_URL" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "EXPO_PUBLIC_API_URL=$API_URL" >> .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_URL: ${{ secrets.API_URL }}

      - name: Fix PNG icons for jimp compatibility
        working-directory: glucolens-mobile
        run: |
          pip install Pillow --break-system-packages -q
          python3 -c "
          from PIL import Image, ImageDraw
          import os

          TEAL = (13, 148, 136, 255)

          def make_icon(size):
              img = Image.new('RGBA', (size, size), TEAL)
              draw = ImageDraw.Draw(img)
              cx, cy = size // 2, size // 2
              r = size // 3
              draw.ellipse([cx-r, cy-r, cx+r, cy+r], outline=(255,255,255,255), width=max(size//20, 2))
              draw.rectangle([cx, cy-size//20, cx+r, cy+size//20], fill=(255,255,255,255))
              return img

          def make_splash(w, h):
              return Image.new('RGBA', (w, h), TEAL)

          d = 'assets/images'
          make_icon(1024).save(os.path.join(d, 'icon.png'))
          make_icon(1024).save(os.path.join(d, 'adaptive-icon.png'))
          make_splash(1284, 2778).save(os.path.join(d, 'splash.png'))
          make_icon(48).save(os.path.join(d, 'favicon.png'))
          make_icon(96).save(os.path.join(d, 'notification-icon.png'))
          print('Icons regenerated successfully')
          "

      - name: Generate native Android project
        working-directory: glucolens-mobile
        run: npx expo prebuild --platform android --no-install

      - name: Install Android dependencies
        working-directory: glucolens-mobile/android
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          chmod +x gradlew

      - name: Build APK
        working-directory: glucolens-mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlucoLens-APK
          path: glucolens-mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

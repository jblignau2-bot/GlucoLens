name: Build Google Play Bundle (AAB)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: glucolens-mobile/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: glucolens-mobile
        run: npm ci

      - name: Create production .env
        working-directory: glucolens-mobile
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL=${{ secrets.API_URL }}
          EOF

      - name: Generate native Android project
        working-directory: glucolens-mobile
        run: npx expo prebuild --platform android --no-install

      - name: Decode keystore
        working-directory: glucolens-mobile/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build signed AAB
        working-directory: glucolens-mobile/android
        run: |
          chmod +x gradlew
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlucoLens-AAB
          path: glucolens-mobile/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
